<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Clock Evolution Simulator</title>
<style>
  :root {
    --bg: #f4f1ea; --panel: #ffffff; --ink: #2c3e50; --line: #ddd5c7;
    --accent: #8e44ad; --good: #27ae60; --bad: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
    color: var(--ink); background: var(--bg);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: baseline; gap: 14px;
    padding: 10px 18px; background: var(--ink); color: #f4f1ea;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  #statusPill {
    font-size: 12px; padding: 2px 10px; border-radius: 10px; background: #566573;
  }
  #statusPill.running { background: #b9770e; }
  #statusPill.success { background: var(--good); }
  #statusPill.failed  { background: var(--bad); }
  main { display: flex; flex: 1; min-height: 0; }

  /* Settings sidebar */
  #settings {
    width: 270px; flex: none; overflow-y: auto; padding: 12px 14px;
    background: var(--panel); border-right: 1px solid var(--line);
  }
  #settings h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .07em;
                 color: #7d8a96; margin: 14px 0 6px; }
  #settings h2:first-child { margin-top: 0; }
  .field { display: flex; align-items: center; justify-content: space-between;
           margin: 4px 0; gap: 8px; }
  .field label { flex: 1; font-size: 13px; }
  .field input[type=number], .field input[type=text], .field select {
    width: 96px; padding: 3px 5px; border: 1px solid var(--line); border-radius: 4px;
    font: inherit; background: #fcfbf8;
  }
  #buttons { display: flex; gap: 8px; margin: 14px 0 6px; }
  button {
    flex: 1; padding: 8px 0; font: inherit; font-weight: 600; border: 0;
    border-radius: 5px; cursor: pointer; color: white; background: var(--accent);
  }
  button:disabled { background: #b9a8c4; cursor: default; }
  #stopBtn { background: var(--bad); }
  #stopBtn:disabled { background: #d5a09a; }
  #configError { color: var(--bad); font-size: 12px; min-height: 16px; }
  #downloads a { font-size: 12px; color: var(--accent); display: block; margin: 2px 0; }

  /* Main area */
  #content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #statusBar {
    padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; gap: 22px; flex-wrap: wrap; font-size: 13px;
  }
  #statusBar b { font-weight: 600; }
  #charts {
    flex: 1; overflow-y: auto; display: grid; gap: 12px; padding: 12px 16px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    align-content: start;
  }
  #charts img {
    width: 100%; background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; display: block;
  }
  #placeholder { grid-column: 1 / -1; color: #7d8a96; padding: 30px;
                 text-align: center; font-size: 15px; }

  /* Timeline strip */
  #timeline {
    flex: none; border-top: 2px solid var(--line); background: var(--panel);
    padding: 8px 12px 10px;
  }
  #timeline h2 { margin: 0 0 6px; font-size: 12px; text-transform: uppercase;
                 letter-spacing: .07em; color: #7d8a96; }
  #strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
  .thumb { flex: none; width: 132px; cursor: pointer; text-align: center; }
  .thumb img { width: 132px; height: 106px; object-fit: contain;
               border: 1px solid var(--line); border-radius: 5px; background: white; }
  .thumb.stage4 img { border-color: var(--good); box-shadow: 0 0 0 1px var(--good); }
  .thumb .cap { font-size: 11px; color: #5d6d7e; margin-top: 2px; }
  .thumb .cap b { color: var(--ink); }

  /* Modal */
  #modal { position: fixed; inset: 0; background: rgba(30,30,30,.65);
           display: none; align-items: center; justify-content: center; z-index: 10; }
  #modal.open { display: flex; }
  #modalBox { background: white; border-radius: 8px; padding: 14px;
              max-width: 88vw; max-height: 92vh; overflow: auto; }
  #modalBox img { max-width: 82vw; max-height: 74vh; display: block; }
  #clockCanvas { max-width: 82vw; max-height: 74vh; display: block;
                 background: #fbfbfd; border-radius: 6px; }
  #modalMeta { display: flex; justify-content: space-between; align-items: center;
               font-size: 13px; margin-top: 6px; gap: 14px; }
  #modalMeta a { color: var(--accent); }
  #modalCtl { display: flex; align-items: center; gap: 14px; }
  #speedCtl { display: flex; align-items: center; gap: 6px; color: #555; }
  #clockToggle { cursor: pointer; font-size: 12px; padding: 3px 10px;
                 border: 1px solid var(--line); border-radius: 5px; background: #fff; }
</style>
</head>
<body>
<header>
  <h1>&#9881; Clock Evolution Simulator</h1>
  <span id="statusPill">idle</span>
</header>
<main>
  <aside id="settings">
    <div id="form"></div>
    <div id="buttons">
      <button id="runBtn">Run</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>
    <div id="configError"></div>
    <h2>Downloads</h2>
    <div id="downloads">
      <a href="/api/best_clock.json">best_clock.json</a>
      <a href="/api/history.json">history.json</a>
    </div>
  </aside>
  <div id="content">
    <div id="statusBar">
      <span>Generation <b id="stGen">&ndash;</b></span>
      <span>Best score <b id="stScore">&ndash;</b></span>
      <span>Stage <b id="stStage">&ndash;</b></span>
      <span>Ratios (target 60 : 12) <b id="stRatios">&ndash;</b></span>
      <span id="stResult"></span>
    </div>
    <div id="charts">
      <div id="placeholder">Adjust the settings and press <b>Run</b> to evolve clocks.</div>
      <img id="chartHands" hidden alt="hands over time">
      <img id="chartFitness" hidden alt="fitness over time">
      <img id="chartAccuracy" hidden alt="accuracy over time">
      <img id="chartMass" hidden alt="mass over time">
    </div>
    <div id="timeline">
      <h2>Best-clock timeline &mdash; click a clock to enlarge</h2>
      <div id="strip"></div>
    </div>
  </div>
</main>
<div id="modal">
  <div id="modalBox">
    <canvas id="clockCanvas" width="900" height="640"></canvas>
    <img id="modalImg" alt="clock schematic" hidden>
    <div id="modalMeta">
      <span id="modalCap"></span>
      <span id="modalCtl">
        <label id="speedCtl">Speed <b id="speedVal">1× (real time)</b> <input id="clockSpeed" type="range" min="1" max="600" value="1"></label>
        <button id="clockToggle">Schematic</button>
        <a id="modalDna" href="#">Download DNA</a>
      </span>
    </div>
  </div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);

const GROUPS = [
  ["Component bounds", ["min_cog_teeth", "max_cog_teeth", "min_ratchet_teeth",
                        "max_ratchet_teeth", "min_inner_outer_gap", "max_cogs",
                        "max_meshes_per_cog"]],
  ["Evolution", ["population_size", "mutation_rate", "selection_method", "tournament_size"]],
  ["Simulation", ["generations_per_run", "visualization_frequency", "ratio_tolerance",
                  "material_weight", "direction_weight", "stop_on_success", "random_seed"]],
];
const LABELS = {
  min_cog_teeth: "Min cog teeth", max_cog_teeth: "Max cog teeth",
  min_ratchet_teeth: "Min ratchet teeth", max_ratchet_teeth: "Max ratchet teeth",
  min_inner_outer_gap: "Inner/outer gap", max_cogs: "Max cogs per clock",
  max_meshes_per_cog: "Max meshes per cog",
  population_size: "Population size", mutation_rate: "Mutation rate",
  selection_method: "Selection method", tournament_size: "Tournament size",
  generations_per_run: "Generation limit", visualization_frequency: "Snapshot every N gen",
  ratio_tolerance: "Ratio tolerance", material_weight: "Material weight",
  direction_weight: "Direction weight", stop_on_success: "Stop on success",
  random_seed: "Random seed (blank = random)",
};
const FLOATS = new Set(["mutation_rate", "ratio_tolerance", "material_weight", "direction_weight"]);

let defaults = {};
let runId = 0, lastSnapshots = -1, thumbsShown = 0, pollTimer = null;

function fieldHtml(key, value) {
  const label = LABELS[key] || key;
  if (key === "selection_method") {
    const opts = ["tournament", "random", "best"].map(
      m => `<option ${m === value ? "selected" : ""}>${m}</option>`).join("");
    return `<div class="field"><label>${label}</label><select id="f_${key}">${opts}</select></div>`;
  }
  if (typeof value === "boolean") {
    return `<div class="field"><label>${label}</label>` +
           `<input type="checkbox" id="f_${key}" ${value ? "checked" : ""}></div>`;
  }
  if (key === "random_seed") {
    return `<div class="field"><label>${label}</label>` +
           `<input type="text" id="f_${key}" value="${value === null ? "" : value}"></div>`;
  }
  const step = FLOATS.has(key) ? "0.01" : "1";
  return `<div class="field"><label>${label}</label>` +
         `<input type="number" step="${step}" id="f_${key}" value="${value}"></div>`;
}

async function loadDefaults() {
  const data = await (await fetch("/api/defaults")).json();
  defaults = data.values;
  $("form").innerHTML = GROUPS.map(([title, keys]) =>
    `<h2>${title}</h2>` + keys.map(k => fieldHtml(k, defaults[k])).join("")
  ).join("");
}

function collectOverrides() {
  const out = {};
  for (const [, keys] of GROUPS) {
    for (const key of keys) {
      const el = $("f_" + key);
      if (!el) continue;
      if (el.type === "checkbox") { out[key] = el.checked; continue; }
      if (key === "selection_method") { out[key] = el.value; continue; }
      const raw = el.value.trim();
      if (key === "random_seed") { out[key] = raw === "" ? null : parseInt(raw, 10); continue; }
      out[key] = FLOATS.has(key) ? parseFloat(raw) : parseInt(raw, 10);
      if (Number.isNaN(out[key])) throw new Error("Invalid value for " + key);
    }
  }
  return out;
}

async function startRun() {
  $("configError").textContent = "";
  let overrides;
  try { overrides = collectOverrides(); }
  catch (err) { $("configError").textContent = err.message; return; }
  const resp = await fetch("/api/run", { method: "POST", body: JSON.stringify(overrides) });
  const data = await resp.json();
  if (!resp.ok) { $("configError").textContent = data.error || "failed to start"; return; }
  runId = data.run_id;
  lastSnapshots = -1;
  thumbsShown = 0;
  $("strip").innerHTML = "";
  $("placeholder").hidden = true;
  for (const img of ["chartHands", "chartFitness", "chartAccuracy", "chartMass"]) $(img).hidden = false;
  schedulePoll(0);
}

function setPill(text, cls) {
  const pill = $("statusPill");
  pill.textContent = text;
  pill.className = cls || "";
}

function updateCharts(st) {
  if (st.snapshot_count === lastSnapshots) return;
  lastSnapshots = st.snapshot_count;
  const rev = `${st.run_id}-${st.snapshot_count}`;
  $("chartHands").src = `/api/plot/hands.png?rev=${rev}`;
  $("chartFitness").src = `/api/plot/fitness.png?rev=${rev}`;
  $("chartAccuracy").src = `/api/plot/accuracy.png?rev=${rev}`;
  $("chartMass").src = `/api/plot/mass.png?rev=${rev}`;
}

function updateTimeline(st) {
  const strip = $("strip");
  for (; thumbsShown < st.improvements.length; thumbsShown++) {
    const imp = st.improvements[thumbsShown];
    const div = document.createElement("div");
    div.className = "thumb" + (imp.accurate ? " stage4" : "");
    const ratios = imp.ratios.map(r => r.toFixed(1)).join(" : ") || "&ndash;";
    div.innerHTML =
      `<img loading="lazy" src="/api/clock/${imp.index}.png?run=${st.run_id}">` +
      `<div class="cap"><b>gen ${imp.generation}</b> &middot; stage ${imp.stage}<br>${ratios}</div>`;
    div.onclick = () => openModal(imp, st.run_id);
    strip.appendChild(div);
    strip.scrollLeft = strip.scrollWidth;
  }
}

// ---- Animated clock renderer --------------------------------------------
const anim = { raf: 0, model: null, run: 0, index: 0 };
const HAND_COLORS = { Seconds: "#c0392b", Minutes: "#2c6fad", Hours: "#27773f" };

function stopAnim() { if (anim.raf) cancelAnimationFrame(anim.raf); anim.raf = 0; }

function gearPath(ctx, r, teeth, toothH) {
  // a castellated (square-tooth) gear outline centred at the origin
  const N = Math.max(3, teeth);
  for (let k = 0; k < N; k++) {
    const a0 = (k / N) * 2 * Math.PI, a1 = ((k + 0.3) / N) * 2 * Math.PI;
    const a2 = ((k + 0.7) / N) * 2 * Math.PI, a3 = ((k + 1) / N) * 2 * Math.PI;
    const rt = r + toothH;
    if (k === 0) ctx.moveTo(r * Math.cos(a0), r * Math.sin(a0));
    ctx.lineTo(r * Math.cos(a0), r * Math.sin(a0));
    ctx.lineTo(rt * Math.cos(a1), rt * Math.sin(a1));
    ctx.lineTo(rt * Math.cos(a2), rt * Math.sin(a2));
    ctx.lineTo(r * Math.cos(a3), r * Math.sin(a3));
  }
  ctx.closePath();
}

function drawScene(ctx, model, tf, t, vscale) {
  const { X, Y, s } = tf;
  // mesh connections (faint)
  ctx.strokeStyle = "#d0d6dc"; ctx.lineWidth = 1;
  const byId = {}; model.cogs.forEach(c => byId[c.id] = c);
  model.meshes.forEach(m => {
    const a = byId[m.a], b = byId[m.b];
    if (a && b) { ctx.beginPath(); ctx.moveTo(X(a.x), Y(a.y)); ctx.lineTo(X(b.x), Y(b.y)); ctx.stroke(); }
  });

  // spring + pendulum (world-space, so they scale and stay inside the view)
  const rt = model.ratchet, rrx = X(rt.x), rry = Y(rt.y), rr = rt.radius * s;
  const sp = model.spring;
  ctx.strokeStyle = sp.connected ? "#27ae60" : "#c4c4c4"; ctx.lineWidth = 1.5;
  ctx.strokeRect(X(sp.x - sp.hw), Y(sp.y + sp.hh), 2 * sp.hw * s, 2 * sp.hh * s);
  if (sp.connected) { ctx.beginPath(); ctx.moveTo(X(sp.x + sp.hw), Y(sp.y)); ctx.lineTo(rrx, rry); ctx.stroke(); }
  const pd = model.pendulum, pivx = X(pd.pivot_x), pivy = Y(pd.pivot_y), Lpx = pd.len * s;
  const swing = pd.connected ? 0.4 * Math.sin(2 * Math.PI * 0.8 * t) : 0;
  const bx = pivx + Lpx * Math.sin(swing), by = pivy + Lpx * Math.cos(swing);
  ctx.strokeStyle = pd.connected ? "#e67e22" : "#c4c4c4"; ctx.lineWidth = 2;
  if (pd.connected) { ctx.beginPath(); ctx.moveTo(pivx, pivy); ctx.lineTo(rrx, rry); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(pivx, pivy); ctx.lineTo(bx, by); ctx.stroke();
  ctx.fillStyle = pd.connected ? "#e67e22" : "#c4c4c4";
  ctx.beginPath(); ctx.arc(bx, by, Math.max(3, pd.bob * s), 0, 2 * Math.PI); ctx.fill();

  // ratchet wheel
  ctx.save(); ctx.translate(rrx, rry); ctx.rotate(rt.omega * vscale * 2 * Math.PI * t);
  ctx.strokeStyle = "#8e44ad"; ctx.fillStyle = "rgba(142,68,173,0.12)"; ctx.lineWidth = 1.6;
  ctx.beginPath(); gearPath(ctx, rr, rt.teeth, Math.max(2, 0.5 * s)); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(rr, 0); ctx.stroke();
  ctx.restore();

  // cogs
  for (const c of model.cogs) {
    const cx = X(c.x), cy = Y(c.y), rOut = c.r_out * s, rIn = c.r_in * s;
    const tooth = Math.max(2, 0.5 * s);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(c.omega * vscale * 2 * Math.PI * t);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = c.is_drive ? "#8e44ad" : (c.powered ? "#34495e" : "#aeb6bd");
    ctx.fillStyle = c.powered ? "rgba(90,130,170,0.16)" : "rgba(170,180,190,0.10)";
    ctx.beginPath(); gearPath(ctx, rOut, c.outer_teeth, tooth); ctx.fill(); ctx.stroke();
    ctx.beginPath(); gearPath(ctx, rIn, c.inner_teeth, tooth * 0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(rOut, 0); ctx.stroke();  // spoke marker
    ctx.fillStyle = ctx.strokeStyle;
    ctx.beginPath(); ctx.arc(0, 0, Math.max(2, rIn * 0.3), 0, 2 * Math.PI); ctx.fill();
    ctx.restore();
    ctx.fillStyle = c.powered ? "#34495e" : "#9aa3ab";
    ctx.font = "11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(c.id, cx, cy - rOut - 5);
  }

  // hands (rotate with their cog; y is flipped on screen)
  for (const h of model.hands) {
    const cx = X(h.x), cy = Y(h.y), L = h.length * s;
    // screen angle advances at +omega, matching the cog's ctx.rotate(omega...)
    const ang = (Math.PI / 2 - h.index * Math.PI / 4) + h.omega * vscale * 2 * Math.PI * t;
    const tx = cx + L * Math.cos(ang), ty = cy + L * Math.sin(ang);
    ctx.strokeStyle = h.role ? HAND_COLORS[h.role] : "#b3b3b3";
    ctx.lineWidth = h.role === "Hours" ? 4.5 : h.role === "Minutes" ? 3 : 2;
    ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.lineCap = "butt";
    if (h.role) {
      ctx.fillStyle = ctx.strokeStyle; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(h.role, tx, ty - 6);
    }
  }
}

function startAnim(model) {
  stopAnim();
  anim.model = model;
  const cv = $("clockCanvas"), ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height, pad = 36, b = model.bounds;
  const ww = Math.max(b.maxx - b.minx, 1), wh = Math.max(b.maxy - b.miny, 1);
  const s = Math.min((W - 2 * pad) / ww, (H - 2 * pad) / wh);
  const midx = (b.minx + b.maxx) / 2, midy = (b.miny + b.maxy) / 2;
  const tf = { s, X: wx => W / 2 + s * (wx - midx), Y: wy => H / 2 - s * (wy - midy) };
  // Wall-clock lock: pin the second hand to 1 rev / 60 s and scale every cog by
  // the same factor, so the evolved ratios stay exact. The slider is then a
  // real-time multiplier (x1 = an actual clock). If no hand turns, fall back to
  // making the fastest element visible so partial mechanisms still animate.
  let secOmega = 0;
  model.hands.forEach(h => { if (h.role === "Seconds") secOmega = Math.abs(h.omega); });
  let baseScale;
  if (secOmega > 1e-12) {
    baseScale = (1 / 60) / secOmega;       // seconds hand -> 1 rev / 60 s at x1
  } else {
    let maxw = 1e-9;
    model.cogs.forEach(c => maxw = Math.max(maxw, Math.abs(c.omega)));
    maxw = Math.max(maxw, Math.abs(model.ratchet.omega));
    baseScale = 0.2 / maxw;
  }
  const t0 = performance.now();
  (function frame(now) {
    const t = (now - t0) / 1000;
    ctx.clearRect(0, 0, W, H);
    drawScene(ctx, model, tf, t, baseScale * (+$("clockSpeed").value));
    anim.raf = requestAnimationFrame(frame);
  })(t0);
}

function showSchematic(show) {
  $("modalImg").hidden = !show;
  $("clockCanvas").hidden = show;
  $("speedCtl").style.visibility = show ? "hidden" : "visible";
  $("clockToggle").textContent = show ? "Animation" : "Schematic";
  if (show) { stopAnim(); $("modalImg").src = `/api/clock/${anim.index}.png?size=full&run=${anim.run}`; }
  else if (anim.model) startAnim(anim.model);
}

async function openModal(imp, run) {
  anim.run = run; anim.index = imp.index; anim.model = null;
  $("modalCap").textContent =
    `Generation ${imp.generation} - stage ${imp.stage} - score ${imp.score.toFixed(1)}` +
    (imp.ratios.length ? ` - ratios ${imp.ratios.map(r => r.toFixed(2)).join(" : ")}` : "");
  $("modalDna").href = `/api/clock/${imp.index}.json`;
  showSchematic(false);
  $("modal").classList.add("open");
  try {
    const model = await (await fetch(`/api/clock/${imp.index}/model.json`)).json();
    if ($("modal").classList.contains("open")) { anim.model = model; if ($("modalImg").hidden) startAnim(model); }
  } catch (e) { showSchematic(true); }
}

$("clockSpeed").oninput = () => {
  const v = $("clockSpeed").value;
  $("speedVal").textContent = v === "1" ? "1× (real time)" : v + "×";
};
function closeModal() { stopAnim(); $("modal").classList.remove("open"); }
$("clockToggle").onclick = () => showSchematic($("clockCanvas").hidden ? false : true);
$("modal").onclick = e => { if (e.target === $("modal")) closeModal(); };
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

async function poll() {
  let st;
  try { st = await (await fetch("/api/status")).json(); }
  catch (err) { schedulePoll(2000); return; }
  if (!st.started) { schedulePoll(1500); return; }

  $("stGen").textContent = `${st.generation.toLocaleString()} / ${st.generation_limit.toLocaleString()}`;
  $("stScore").textContent = st.best_score.toFixed(1);
  $("stStage").textContent = st.best_stage;
  $("stRatios").textContent = st.best_ratios.length
    ? st.best_ratios.map(r => r.toFixed(2)).join(" : ") : "-";
  $("runBtn").disabled = st.running;
  $("stopBtn").disabled = !st.running;

  if (st.error) {
    setPill("error", "failed");
    $("stResult").textContent = st.error;
  } else if (st.running) {
    setPill("running", "running");
    $("stResult").textContent = "";
  } else if (st.success) {
    setPill("success", "success");
    $("stResult").innerHTML =
      `<b style="color:var(--good)">Three-handed clock evolved at generation ${st.success_generation.toLocaleString()}</b>`;
  } else {
    setPill(st.stopped ? "stopped" : "finished", "failed");
    $("stResult").textContent = "No stage-4 clock reached.";
  }

  updateCharts(st);
  updateTimeline(st);
  schedulePoll(st.running ? 700 : 3000);
}

function schedulePoll(delay) {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(poll, delay);
}

$("runBtn").onclick = startRun;
$("stopBtn").onclick = () => fetch("/api/stop", { method: "POST" });

loadDefaults().then(() => schedulePoll(300));
</script>
</body>
</html>
